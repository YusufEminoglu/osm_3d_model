name: Quality

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  static-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install quality tools
        run: python -m pip install --disable-pip-version-check flake8 bandit
      - name: Compile Python
        run: python -m compileall -q __init__.py builder.py dialog.py main_plugin.py osm_download.py qgis_styling.py server.py
      - name: Flake8
        run: python -m flake8 __init__.py builder.py dialog.py main_plugin.py osm_download.py qgis_styling.py server.py
      - name: Bandit (medium and high severity)
        run: python -m bandit -q -ll __init__.py builder.py dialog.py main_plugin.py osm_download.py qgis_styling.py server.py
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Check viewer syntax
        run: node --check web/src/app.js && node --check web/src/export_utils.js
      - name: Lint viewer globals and dead declarations
        run: npx --yes eslint@8.57.1 web/src/app.js web/src/export_utils.js --no-eslintrc --env browser,es2021 --parser-options ecmaVersion:2022 --parser-options sourceType:module --rule no-undef:error --rule no-unused-vars:error
      - name: Test export utilities
        run: node tests/export_utils_check.mjs
