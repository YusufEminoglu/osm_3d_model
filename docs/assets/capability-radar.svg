<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 560" role="img" aria-labelledby="title desc">
  <title id="title">Capability radar</title>
  <desc id="desc">A spider radar chart highlighting the plugin's workflow, OSM schema, 3D engine, mobility, terrain, presentation, and reliability capabilities.</desc>
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="70%">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.72" stop-color="#f5ebe6"/>
      <stop offset="1" stop-color="#dcebe7"/>
    </radialGradient>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#5f4940" flood-opacity="0.15"/>
    </filter>
    <style>
      .text { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #26343b; }
      .title { font-size: 30px; font-weight: 850; letter-spacing: 0; }
      .label { font-size: 15px; font-weight: 760; }
      .score { font-size: 12px; fill: #6d767a; }
      .ring { fill: none; stroke: #dac8c0; stroke-width: 1.2; }
      .axis { stroke: #bda89f; stroke-width: 1; }
    </style>
  </defs>
  <rect width="920" height="560" rx="28" fill="url(#glow)"/>
  <text x="42" y="50" class="text title">Capability radar</text>
  <text x="42" y="79" class="text score">A GitHub-ready spider view of what makes 3D OSM Model unusually useful.</text>

  <g transform="translate(460 294)" filter="url(#soft-shadow)">
    <circle r="196" fill="#ffffff" opacity="0.72"/>
    <polygon points="0,-190 165,-95 165,95 0,190 -165,95 -165,-95" class="ring"/>
    <polygon points="0,-152 132,-76 132,76 0,152 -132,76 -132,-76" class="ring"/>
    <polygon points="0,-114 99,-57 99,57 0,114 -99,57 -99,-57" class="ring"/>
    <polygon points="0,-76 66,-38 66,38 0,76 -66,38 -66,-38" class="ring"/>
    <polygon points="0,-38 33,-19 33,19 0,38 -33,19 -33,-19" class="ring"/>
    <g class="axis">
      <path d="M0 0 L0 -205"/>
      <path d="M0 0 L178 -103"/>
      <path d="M0 0 L178 103"/>
      <path d="M0 0 L0 205"/>
      <path d="M0 0 L-178 103"/>
      <path d="M0 0 L-178 -103"/>
    </g>
    <polygon points="0,-183 154,-89 143,83 0,171 -151,87 -159,-92" fill="#b8978a" opacity="0.32" stroke="#8f6f5b" stroke-width="4"/>
    <polygon points="0,-183 154,-89 143,83 0,171 -151,87 -159,-92" fill="none" stroke="#2f4858" stroke-width="2" opacity="0.45"/>
    <g opacity="0.85">
      <line x1="0" y1="0" x2="0" y2="-188" stroke="#f2b777" stroke-width="3" stroke-linecap="round">
        <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="12s" repeatCount="indefinite"/>
      </line>
      <circle cx="0" cy="0" r="5" fill="#2f4858"/>
    </g>
  </g>

  <g class="text label">
    <text x="429" y="105" text-anchor="middle">One-button</text>
    <text x="696" y="213" text-anchor="middle">OSM-native</text>
    <text x="700" y="428" text-anchor="middle">Procedural 3D</text>
    <text x="460" y="526" text-anchor="middle">Mobility life</text>
    <text x="217" y="428" text-anchor="middle">Terrain + DEM</text>
    <text x="216" y="213" text-anchor="middle">Presentation</text>
  </g>
  <g class="text score">
    <text x="429" y="125" text-anchor="middle">export to viewer</text>
    <text x="696" y="233" text-anchor="middle">raw tags preserved</text>
    <text x="700" y="448" text-anchor="middle">roads, roofs, water</text>
    <text x="460" y="546" text-anchor="middle">cars, cyclists, pedestrians</text>
    <text x="217" y="448" text-anchor="middle">flat fallback ready</text>
    <text x="216" y="233" text-anchor="middle">screenshots, measure, walk</text>
  </g>
</svg>
