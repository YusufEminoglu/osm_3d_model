<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">3D OSM Model hero</title>
  <desc id="desc">A polished isometric city scene showing OpenStreetMap data transformed into a Three.js 3D city viewer.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff8f3"/>
      <stop offset="0.52" stop-color="#f1e2dc"/>
      <stop offset="1" stop-color="#d9e7e4"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#f3e7e1" stop-opacity="0.92"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#69a7b0"/>
      <stop offset="1" stop-color="#a7d5d5"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#6b5149" flood-opacity="0.2"/>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="9"/>
    </filter>
    <style>
      .label { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #25333a; }
      .small { font-size: 15px; fill: #5d6a70; }
      .chip { font-size: 13px; font-weight: 700; letter-spacing: 0.02em; }
      .title { font-size: 48px; font-weight: 850; letter-spacing: 0; }
      .subtitle { font-size: 21px; font-weight: 520; fill: #49565d; }
      .ui { font-size: 12px; font-weight: 700; fill: #344149; }
      .axis { stroke: #d3bdb4; stroke-width: 1.2; }
    </style>
  </defs>

  <rect width="1200" height="520" rx="34" fill="url(#sky)"/>
  <circle cx="1052" cy="92" r="50" fill="#f2b777" opacity="0.92"/>
  <circle cx="1052" cy="92" r="82" fill="#f2b777" opacity="0.2" filter="url(#soft)"/>
  <path d="M0 408 C164 372 248 430 405 394 C569 356 709 381 838 410 C970 441 1050 390 1200 413 L1200 520 L0 520 Z" fill="#d8c7be" opacity="0.55"/>

  <g transform="translate(130 76)" filter="url(#shadow)">
    <path d="M396 28 C514 28 641 64 720 128 C792 187 799 256 719 303 C601 373 316 368 175 312 C29 254 30 145 155 76 C215 43 305 28 396 28 Z" fill="#f5eee9"/>
    <path d="M394 47 C500 47 617 78 688 135 C753 186 755 246 686 287 C580 351 327 346 199 295 C69 242 70 152 181 91 C237 60 317 47 394 47 Z" fill="#e8d7ce" stroke="#b8978a" stroke-width="3" stroke-dasharray="10 10"/>
    <path d="M374 88 C454 92 548 111 600 153 C644 190 633 234 575 256 C485 290 318 286 236 249 C158 214 169 155 253 115 C286 99 329 91 374 88 Z" fill="#cbd8c6"/>

    <path d="M163 224 C256 192 347 188 445 211 C517 228 603 219 675 183" fill="none" stroke="#79838a" stroke-width="25" stroke-linecap="round"/>
    <path d="M163 224 C256 192 347 188 445 211 C517 228 603 219 675 183" fill="none" stroke="#f8f4f1" stroke-width="3" stroke-dasharray="16 16" stroke-linecap="round"/>
    <path d="M300 301 C345 246 425 221 502 206" fill="none" stroke="#85929a" stroke-width="16" stroke-linecap="round"/>
    <path d="M300 301 C345 246 425 221 502 206" fill="none" stroke="#f8f4f1" stroke-width="2" stroke-dasharray="10 14" stroke-linecap="round"/>
    <path d="M205 118 C266 143 345 153 451 151 C535 150 604 137 655 107" fill="none" stroke="url(#water)" stroke-width="18" stroke-linecap="round"/>
    <path d="M250 265 C315 261 354 272 413 302" fill="none" stroke="#3b9f65" stroke-width="9" stroke-linecap="round"/>

    <g transform="translate(283 130)">
      <polygon points="0,34 47,12 80,33 33,56" fill="#97a2a8"/>
      <polygon points="0,34 33,56 33,109 0,88" fill="#59656d"/>
      <polygon points="33,56 80,33 80,86 33,109" fill="#79858c"/>
      <polygon points="0,34 47,12 80,33 33,56" fill="#c9c1bd"/>
      <g stroke="#eef1ee" stroke-width="2" opacity="0.65">
        <path d="M13 43 L25 49 M13 59 L25 65 M13 75 L25 81"/>
        <path d="M46 55 L68 44 M46 72 L68 61 M46 89 L68 78"/>
      </g>
    </g>
    <g transform="translate(388 114)">
      <polygon points="0,44 55,18 94,43 39,70" fill="#8f9aa2"/>
      <polygon points="0,44 39,70 39,156 0,132" fill="#47525b"/>
      <polygon points="39,70 94,43 94,129 39,156" fill="#66747c"/>
      <polygon points="0,44 55,18 94,43 39,70" fill="#d8d0cb"/>
      <g stroke="#f7f2ef" stroke-width="2" opacity="0.7">
        <path d="M14 59 L29 68 M14 79 L29 88 M14 99 L29 108 M14 119 L29 128"/>
        <path d="M56 69 L80 57 M56 89 L80 77 M56 109 L80 97 M56 129 L80 117"/>
      </g>
    </g>
    <g transform="translate(492 166)">
      <polygon points="0,31 42,11 76,32 34,54" fill="#9a8c84"/>
      <polygon points="0,31 34,54 34,118 0,96" fill="#5a5250"/>
      <polygon points="34,54 76,32 76,96 34,118" fill="#776d68"/>
      <polygon points="0,31 42,11 76,32 34,54" fill="#c6b3aa"/>
    </g>
    <g transform="translate(208 182)">
      <polygon points="0,24 38,6 66,25 29,44" fill="#8aa099"/>
      <polygon points="0,24 29,44 29,84 0,66" fill="#536e67"/>
      <polygon points="29,44 66,25 66,66 29,84" fill="#6f8780"/>
      <polygon points="0,24 38,6 66,25 29,44" fill="#d2c5bd"/>
    </g>
    <g transform="translate(550 96)">
      <polygon points="0,26 40,7 70,28 30,49" fill="#7f8f97"/>
      <polygon points="0,26 30,49 30,111 0,89" fill="#43525b"/>
      <polygon points="30,49 70,28 70,90 30,111" fill="#61717a"/>
      <polygon points="0,26 40,7 70,28 30,49" fill="#d6ccc7"/>
    </g>

    <g fill="#6e8f58">
      <circle cx="244" cy="102" r="11"/>
      <circle cx="603" cy="258" r="12"/>
      <circle cx="552" cy="283" r="9"/>
      <circle cx="221" cy="274" r="9"/>
      <circle cx="630" cy="132" r="10"/>
    </g>
    <g stroke="#4d6d45" stroke-width="2">
      <path d="M244 113 L244 125"/>
      <path d="M603 270 L603 282"/>
      <path d="M552 292 L552 303"/>
      <path d="M221 283 L221 294"/>
      <path d="M630 142 L630 153"/>
    </g>
  </g>

  <g transform="translate(712 158)" filter="url(#shadow)">
    <rect width="286" height="242" rx="22" fill="url(#panel)" stroke="#ffffff" stroke-width="1.2"/>
    <rect x="21" y="24" width="152" height="16" rx="8" fill="#2f4858"/>
    <rect x="21" y="51" width="230" height="10" rx="5" fill="#c9b3aa"/>
    <rect x="21" y="73" width="83" height="62" rx="14" fill="#e7d6ce"/>
    <rect x="117" y="73" width="83" height="62" rx="14" fill="#d9e4df"/>
    <rect x="213" y="73" width="38" height="62" rx="14" fill="#f2c48f"/>
    <text x="35" y="105" class="label ui">Buildings</text>
    <text x="132" y="105" class="label ui">Greens</text>
    <text x="225" y="105" class="label ui">Sun</text>
    <g transform="translate(22 157)">
      <rect width="230" height="13" rx="6.5" fill="#d8c4bb"/>
      <rect width="171" height="13" rx="6.5" fill="#b8978a"/>
      <rect x="165" y="-4" width="21" height="21" rx="10.5" fill="#ffffff" stroke="#b8978a" stroke-width="3"/>
      <text x="0" y="43" class="label small">Live controls: layers, style, sun, walk</text>
    </g>
  </g>

  <g transform="translate(72 52)">
    <text class="label title" x="0" y="0" dominant-baseline="hanging">3D OSM Model</text>
    <text class="label subtitle" x="3" y="66">OpenStreetMap to procedural 3D city in one QGIS flow.</text>
    <g transform="translate(3 110)">
      <rect width="98" height="32" rx="16" fill="#2f4858"/>
      <text x="49" y="21" text-anchor="middle" class="label chip" fill="#ffffff">QGIS</text>
      <rect x="111" width="119" height="32" rx="16" fill="#8f6f5b"/>
      <text x="170" y="21" text-anchor="middle" class="label chip" fill="#ffffff">Overpass</text>
      <rect x="243" width="111" height="32" rx="16" fill="#b8978a"/>
      <text x="298" y="21" text-anchor="middle" class="label chip" fill="#ffffff">GeoJSON</text>
      <rect x="367" width="112" height="32" rx="16" fill="#365c55"/>
      <text x="423" y="21" text-anchor="middle" class="label chip" fill="#ffffff">Three.js</text>
    </g>
  </g>

  <g transform="translate(87 438)">
    <path d="M0 0 H1026" class="axis" opacity="0.45"/>
    <text x="0" y="30" class="label small">Native OSM tags</text>
    <text x="230" y="30" class="label small">Procedural streets</text>
    <text x="470" y="30" class="label small">Terrain ready</text>
    <text x="680" y="30" class="label small">Walkable viewer</text>
    <text x="888" y="30" class="label small">Presentation screenshots</text>
  </g>
</svg>
