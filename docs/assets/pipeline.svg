<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 360" role="img" aria-labelledby="title desc">
  <title id="title">3D OSM Model pipeline</title>
  <desc id="desc">Pipeline from QGIS study area through Overpass and GeoJSON export to the Three.js city viewer.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbf7f4"/>
      <stop offset="1" stop-color="#e2eee9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#4d3d38" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#b8978a"/>
    </marker>
    <style>
      .text { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #26343b; }
      .title { font-weight: 800; font-size: 21px; letter-spacing: 0; }
      .body { font-size: 13px; fill: #5e6a70; }
      .node { fill: #ffffff; stroke: #eadbd4; stroke-width: 1.4; }
      .line { fill: none; stroke: #b8978a; stroke-width: 3; stroke-linecap: round; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect width="1120" height="360" rx="26" fill="url(#bg)"/>
  <g transform="translate(58 78)" filter="url(#shadow)">
    <rect class="node" width="162" height="148" rx="22"/>
    <circle cx="51" cy="57" r="26" fill="#5da85d"/>
    <path d="M42 58 L51 67 L66 43" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="28" y="105" class="text title">QGIS area</text>
    <text x="28" y="129" class="text body">extent or selected</text>
  </g>
  <path class="line" d="M234 152 H312"/>
  <g transform="translate(326 78)" filter="url(#shadow)">
    <rect class="node" width="162" height="148" rx="22"/>
    <circle cx="51" cy="57" r="26" fill="#b8978a"/>
    <path d="M35 58 C48 40 65 45 68 59 C72 78 44 80 38 66" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round"/>
    <text x="28" y="105" class="text title">Study circle</text>
    <text x="28" y="129" class="text body">clipped and capped</text>
  </g>
  <path class="line" d="M502 152 H580"/>
  <g transform="translate(594 78)" filter="url(#shadow)">
    <rect class="node" width="162" height="148" rx="22"/>
    <circle cx="51" cy="57" r="26" fill="#8f6f5b"/>
    <path d="M38 62 H64 M38 52 H64 M44 42 H58" stroke="#ffffff" stroke-width="5" stroke-linecap="round"/>
    <text x="28" y="105" class="text title">Overpass</text>
    <text x="28" y="129" class="text body">OSM mirror fallback</text>
  </g>
  <path class="line" d="M770 152 H848"/>
  <g transform="translate(862 78)" filter="url(#shadow)">
    <rect class="node" width="162" height="148" rx="22"/>
    <circle cx="51" cy="57" r="26" fill="#2f4858"/>
    <path d="M39 45 H64 V70 H39 Z M45 52 H58 M45 61 H58" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="28" y="105" class="text title">GeoJSON</text>
    <text x="28" y="129" class="text body">native OSM fields</text>
  </g>
  <path class="line" d="M944 236 C944 282 790 302 706 272 C638 248 602 247 526 278 C420 321 244 285 244 236"/>
  <g transform="translate(407 245)" filter="url(#shadow)">
    <rect class="node" width="286" height="70" rx="22"/>
    <circle cx="40" cy="35" r="19" fill="#365c55"/>
    <path d="M32 39 L40 24 L50 41 Z" fill="#ffffff"/>
    <text x="72" y="31" class="text title">Three.js city viewer</text>
    <text x="72" y="52" class="text body">procedural 3D, walk mode, screenshots, measure</text>
  </g>
</svg>
